name: build module

on:
  push:
    branches: master
    paths-ignore: 
      - '**.md'
      - 'patches/'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: master

      - name: grab sstrip from ELFkickers
        run: |
          curl -L https://www.muppetlabs.com/~breadbox/pub/software/ELFkickers-3.2.tar.gz -o sstrip.tar.gz
          tar xf sstrip.tar.gz
          make -C ELFkickers-3.2 sstrip
          cp ELFkickers-3.2/sstrip/sstrip .
          chmod +x ./sstrip

      - name: compile via zigcc
        run: |
          mkdir bin
          cd userspace/src
          zig cc -target aarch64-linux -Oz -static -nostdlib -ffreestanding \
            -fno-stack-protector -fno-unwind-tables -fno-asynchronous-unwind-tables \
            -fomit-frame-pointer -fno-ident -flto -fmerge-all-constants -Wno-invalid-noreturn \
            -Wl,--gc-sections -Wl,--build-id=none -Wl,-z,norelro -Wl,-s -Wl,--strip-all \
            -Wl,--entry=_start nm.c -o ../../bin/nm-arm64

          zig cc -target arm-linux -Oz -static -nostdlib -ffreestanding \
            -fno-stack-protector -fno-unwind-tables -fno-asynchronous-unwind-tables \
            -fomit-frame-pointer -fno-ident -flto -fmerge-all-constants -Wno-invalid-noreturn \
            -Wl,--gc-sections -Wl,--build-id=none -Wl,-z,norelro -Wl,-s -Wl,--strip-all \
            -Wl,--entry=_start nm.c -o ../../bin/nm-arm

          cd ../../bin
          wc -c nm-*
          ../sstrip -z nm-arm64
          ../sstrip -z nm-arm
          wc -c nm-*
          file nm-*
          mkdir -p ../module/bin
          mv nm-* ../module/bin/

      - name: Update version code
        run: sed -i 's/^versionCode=.*/versionCode=${{ github.run_number }}/' module/module.prop

      - name: Extract module metadata
        run: |
          NAME=$(sed -n 's/^name=//p' module/module.prop | tr -d '\r' | tr -d ' ')
          VERSION=$(sed -n 's/^version=//p' module/module.prop | tr -d '\r' | tr -d ' ')
          SHORT_HASH=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "MODULE_NAME=$NAME" >> $GITHUB_ENV
          echo "MODULE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_HASH=$SHORT_HASH" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MODULE_NAME }}-${{ env.MODULE_VERSION }}-${{ github.run_number }}-${{ env.COMMIT_HASH }}
          path: module/

